<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>FC Short Term Dry Capacity</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f9f9f8; color: #1a1a1a; padding: 24px; }
  h1 { font-size: 16px; font-weight: 500; color: #444; margin-bottom: 4px; }
  .subtitle { font-size: 12px; color: #888; margin-bottom: 4px; }
  .status { font-size: 11px; color: #aaa; margin-bottom: 20px; }
  .error { color: #c0392b; font-size: 13px; padding: 12px; background: #fdf0ee; border-radius: 8px; }

  .tabs { display: flex; gap: 22px; border-bottom: 0.5px solid rgba(0,0,0,0.1); margin-bottom: 18px; }
  .tab { font-size: 13px; padding-bottom: 8px; cursor: pointer; color: #888; border-bottom: 2px solid transparent; user-select: none; }
  .tab.active { color: #1a1a1a; font-weight: 500; border-bottom-color: #1a1a1a; }

  .pills { display: flex; gap: 8px; margin-bottom: 22px; flex-wrap: wrap; }
  .pill { font-size: 12px; padding: 6px 13px; border-radius: 14px; background: #eeeeec; cursor: pointer; user-select: none; color: #444; }
  .pill.active { background: #1a1a1a; color: #fff; }

  .chart-card { background: #fff; border: 0.5px solid rgba(0,0,0,0.1); border-radius: 12px; padding: 20px; margin-bottom: 16px; }
  .fc-block { margin-bottom: 24px; }
  .fc-header { display: flex; align-items: center; gap: 8px; font-size: 13px; font-weight: 500; color: #444; margin-bottom: 10px; }
  .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }

  table { width: 100%; border-collapse: collapse; font-size: 12px; }
  th { text-align: right; padding: 8px 10px; color: #888; font-weight: 500; border-bottom: 0.5px solid rgba(0,0,0,0.1); font-size: 11px; }
  th:first-child, td:first-child { text-align: left; }
  td { padding: 8px 10px; border-bottom: 0.5px solid rgba(0,0,0,0.06); font-weight: 500; }
  tr:last-child td { border-bottom: none; }
  .fc-label { font-weight: 500; color: #444; }
  .label-sub { color: #bbb; font-weight: 400; font-size: 10px; margin-left: 4px; }

  table.summary td.name { display: flex; align-items: center; gap: 8px; font-weight: 400; }
  tr.indent td.name { padding-left: 32px; }

  .pos { color: #27ae60; } .warn { color: #e67e22; } .neg { color: #c0392b; }
  .onhand { color: #e67e22; }
</style>
</head>
<body>

<h1>Short term dry capacity</h1>
<p class="subtitle" id="subtitle">Loading...</p>
<p class="status" id="status"></p>

<div class="tabs">
  <div class="tab active" data-tab="summary">Summary</div>
  <div class="tab" data-tab="detail">Detail</div>
</div>

<div id="pills" class="pills" style="display:none;"></div>

<div class="chart-card" id="summaryCard">
  <table id="summaryTable"><thead><tr id="summaryHead"></tr></thead><tbody id="summaryBody"></tbody></table>
</div>

<div id="detailView" style="display:none;"></div>

<script>
const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQiDgH4o8p0J8fySDLOMMFujjNVsput_1yPA-dsTCfCtajbD7ozpfZSp_V3qcTJWUQOr4z9BI-fcvaW/pub?gid=535134841&single=true&output=csv';

const FC_ORDER = ['EWR (FC+offsite)', 'EWR', 'MEM', 'FTW', 'RNO', 'SMF', 'JAX', 'MKE'];
const FC_STYLES = {
  'EWR (FC+offsite)': '#378ADD',
  'EWR': '#378ADD',
  'MEM': '#1D9E75',
  'FTW': '#7F77DD',
  'RNO': '#639922',
  'SMF': '#888780',
  'JAX': '#BA7517',
  'MKE': '#D85A30',
};

function parseCSV(text) {
  return text.trim().split('\n').map(r => {
    const cols = []; let cur = '', inQ = false;
    for (let i = 0; i < r.length; i++) {
      const ch = r[i];
      if (ch === '"') { inQ = !inQ; }
      else if (ch === ',' && !inQ) { cols.push(cur.trim()); cur = ''; }
      else { cur += ch; }
    }
    cols.push(cur.trim());
    return cols;
  });
}

function parseVal(v) {
  if (v === undefined || v === null || v === '' || v === '#DIV/0!' || v === '#N/A') return null;
  const n = parseFloat(v.toString().replace('%', '').replace(/,/g, ''));
  return isNaN(n) ? null : n;
}

function shortDate(label) {
  // "6/28/2026" -> "6/28"
  const parts = label.trim().split('/');
  if (parts.length < 2) return label;
  return parts[0] + '/' + parts[1];
}

function utilColor(pct) {
  if (pct >= 100) return 'neg';
  if (pct >= 85) return 'warn';
  return 'pos';
}
function remainColor(rem, cap) {
  if (rem < 0) return 'neg';
  if (cap && rem / cap < 0.15) return 'warn';
  return 'pos';
}

fetch(CSV_URL)
  .then(r => { if (!r.ok) throw new Error('HTTP ' + r.status); return r.text(); })
  .then(text => {
    const rows = parseCSV(text);
    const header = rows[0];
    const dateLabels = header.slice(2);
    const dates = dateLabels.map(shortDate);

    document.getElementById('subtitle').textContent = 'Next ' + dates.length + ' weeks \u00b7 ' + dates[0] + ' \u2013 ' + dates[dates.length - 1];
    document.getElementById('status').textContent = 'Live from Google Sheets \u00b7 refreshes on page load';

    const byType = {};
    rows.slice(1).forEach(r => {
      const type = r[0];
      if (!byType[type]) byType[type] = {};
      byType[type][r[1]] = r.slice(2).map(parseVal);
    });

    const oh = byType['oh'] || {};
    const capacity = byType['capacity'] || {};
    const util = byType['util'] || {};
    const remaining = byType['remaining'] || {};

    // ---------- Summary table ----------
    const head = document.getElementById('summaryHead');
    head.innerHTML = '<th>FC</th>' + dates.map(d => '<th>' + d + '</th>').join('');
    const body = document.getElementById('summaryBody');

    FC_ORDER.forEach(fc => {
      const vals = util[fc];
      if (!vals) return;
      const color = FC_STYLES[fc] || '#888';
      const indent = fc === 'EWR' ? ' style="padding-left:24px;"' : '';
      const cells = vals.map(v => {
        if (v === null) return '<td>\u2014</td>';
        const pct = Math.round(v * 100);
        return '<td class="' + utilColor(v * 100) + '">' + pct + '%</td>';
      }).join('');
      body.innerHTML += '<tr><td class="fc-label"><span class="dot" style="background:' + color + '"></span><span' + indent + '>' + fc + '</span></td>' + cells + '</tr>';
    });

    // ---------- Detail view ----------
    const detailEl = document.getElementById('detailView');

    function metricRow(label, sub, valsArr, colorFn) {
      const cells = valsArr.map(v => {
        if (v === null) return '<td>\u2014</td>';
        const cls = colorFn(v);
        const display = label === 'On Hand' ? Math.round(v).toLocaleString()
          : label === 'Utilization %' ? Math.round(v * 100) + '%'
          : Math.round(v).toLocaleString();
        return '<td class="' + cls + '">' + display + '</td>';
      }).join('');
      return '<tr><td class="fc-label">' + label + (sub ? '<span class="label-sub">' + sub + '</span>' : '') + '</td>' + cells + '</tr>';
    }

    function renderFCBlock(fc) {
      const color = FC_STYLES[fc] || '#888';
      let rowsHtml = '';
      if (fc === 'EWR') {
        rowsHtml += metricRow('Utilization %', 'w/ offsite', util['EWR (FC+offsite)'] || [], v => utilColor(v * 100));
        rowsHtml += metricRow('Net Avail Pallets', 'w/ offsite', remaining['EWR (FC+offsite)'] || [], v => v < 0 ? 'neg' : 'pos');
        rowsHtml += metricRow('Utilization %', 'FC only', util['EWR'] || [], v => utilColor(v * 100));
        rowsHtml += metricRow('Net Avail Pallets', 'FC only', remaining['EWR'] || [], v => v < 0 ? 'neg' : 'pos');
        rowsHtml += metricRow('On Hand', 'FC only', oh['EWR'] || [], () => 'onhand');
      } else {
        rowsHtml += metricRow('Utilization %', '', util[fc] || [], v => utilColor(v * 100));
        rowsHtml += metricRow('Net Avail Pallets', '', remaining[fc] || [], v => v < 0 ? 'neg' : 'pos');
        rowsHtml += metricRow('On Hand', '', oh[fc] || [], () => 'onhand');
      }
      return '<div class="fc-block chart-card">' +
        '<div class="fc-header"><span class="dot" style="background:' + color + '"></span>' + fc + '</div>' +
        '<table><tr><th></th>' + dates.map(d => '<th>' + d + '</th>').join('') + '</tr>' + rowsHtml + '</table>' +
        '</div>';
    }

    function renderDetail(filter) {
      const fcsToShow = filter === 'ALL'
        ? ['EWR', 'MEM', 'FTW', 'RNO', 'SMF', 'JAX', 'MKE']
        : [filter];
      detailEl.innerHTML = fcsToShow.map(renderFCBlock).join('');
    }

    // ---------- Pills ----------
    const pillsEl = document.getElementById('pills');
    const pillFCs = [{ key: 'ALL', label: 'All FCs' }, ...['EWR','MEM','FTW','RNO','SMF','JAX','MKE'].map(f => ({ key: f, label: f }))];
    pillsEl.innerHTML = pillFCs.map((f, i) => '<div class="pill' + (i === 0 ? ' active' : '') + '" data-filter="' + f.key + '">' + f.label + '</div>').join('');
    pillsEl.querySelectorAll('.pill').forEach(p => {
      p.addEventListener('click', () => {
        pillsEl.querySelectorAll('.pill').forEach(x => x.classList.remove('active'));
        p.classList.add('active');
        renderDetail(p.dataset.filter);
      });
    });

    renderDetail('ALL');

    // ---------- Tabs ----------
    document.querySelectorAll('.tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        const isDetail = tab.dataset.tab === 'detail';
        document.getElementById('summaryCard').style.display = isDetail ? 'none' : '';
        detailEl.style.display = isDetail ? '' : 'none';
        pillsEl.style.display = isDetail ? 'flex' : 'none';
      });
    });
  })
  .catch(err => {
    document.getElementById('summaryCard').innerHTML = '<div class="error">Could not load data: ' + err.message + '</div>';
  });
</script>

 
</body>
</html>
