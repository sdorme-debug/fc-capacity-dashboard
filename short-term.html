<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FC Short Term Capacity</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f9f9f8; color: #1a1a1a; padding: 24px; }
    h1 { font-size: 16px; font-weight: 500; color: #444; margin-bottom: 4px; }
    .subtitle { font-size: 12px; color: #888; margin-bottom: 20px; }
    .status { font-size: 11px; color: #aaa; margin-top: 16px; }
    .error { color: #c0392b; font-size: 13px; padding: 12px; background: #fdf0ee; border-radius: 8px; }
 
    /* Tab nav */
    .tab-nav { display: flex; gap: 0; margin-bottom: 20px; border-bottom: 1px solid rgba(0,0,0,0.1); }
    .tab-btn { font-size: 12px; padding: 8px 18px; cursor: pointer; border: none; background: none; color: #888; border-bottom: 2px solid transparent; margin-bottom: -1px; transition: all 0.15s; }
    .tab-btn.active { color: #1a1a1a; border-bottom-color: #1a1a1a; font-weight: 500; }
    .tab-btn:hover:not(.active) { color: #555; }
 
    /* Summary table */
    .summary-card { background: #fff; border: 0.5px solid rgba(0,0,0,0.1); border-radius: 12px; padding: 20px 24px; }
    .summary-table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .summary-table th { font-size: 12px; font-weight: 600; color: #333; text-align: left; padding: 0 16px 14px 0; border-bottom: 1px solid rgba(0,0,0,0.1); }
    .summary-table th.week-col { text-align: center; min-width: 80px; }
    .summary-table td { padding: 12px 16px 12px 0; border-bottom: 0.5px solid rgba(0,0,0,0.06); color: #444; font-size: 13px; vertical-align: middle; }
    .summary-table td.fc-name { font-weight: 500; color: #222; white-space: nowrap; min-width: 160px; }
    .summary-table td.fc-name .fc-dot-sm { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 8px; vertical-align: middle; }
    .summary-table td.util-val { text-align: center; font-weight: 500; font-size: 13px; }
    .summary-table td.na-val { text-align: center; color: #ccc; font-size: 13px; }
    .summary-table tr:last-child td { border-bottom: none; }
 
    /* Detail cards */
    .fc-card { background: #fff; border: 0.5px solid rgba(0,0,0,0.1); border-radius: 12px; padding: 16px 20px; margin-bottom: 10px; }
    .fc-header { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; font-size: 14px; font-weight: 500; color: #333; }
    .fc-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }
    table { width: 100%; border-collapse: collapse; font-size: 12px; table-layout: fixed; }
    .col-label { width: 140px; }
    th { font-size: 11px; color: #888; font-weight: 400; text-align: center; padding: 4px 6px 8px; border-bottom: 0.5px solid rgba(0,0,0,0.08); }
    th.col-label { text-align: left; }
    td { padding: 5px 6px; text-align: center; }
    td.row-label { text-align: left; font-size: 11px; color: #888; white-space: nowrap; }
    .val-cell { background: #f9f9f8; border-radius: 6px; padding: 5px 4px; font-size: 13px; font-weight: 500; display: block; }
    .na-cell { background: #f9f9f8; border-radius: 6px; padding: 5px 4px; font-size: 13px; color: #ccc; display: block; }
  </style>
</head>
<body>
  <h1>Short term freezer capacity</h1>
  <p class="subtitle" id="subtitle">Loading...</p>
 
  <div class="tab-nav">
    <button class="tab-btn active" id="tab-summary" onclick="switchTab('summary')">Summary</button>
    <button class="tab-btn" id="tab-detail" onclick="switchTab('detail')">Detail</button>
  </div>
 
  <!-- Summary view -->
  <div id="view-summary">
    <div class="summary-card">
      <table class="summary-table">
        <thead>
          <tr id="summary-header">
            <th>FC</th>
          </tr>
        </thead>
        <tbody id="summary-body"></tbody>
      </table>
    </div>
  </div>
 
  <!-- Detail view -->
  <div id="view-detail" style="display:none;">
    <div id="content"></div>
  </div>
 
  <p class="status" id="status"></p>
 
  <script>
    const ST_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRgqmVRirhaQ3AKoXv3nRKc1VK7DFlEkUQgfCLBINLi0nYD7zeapoRu7lY4pYP87MarrwiboOXjtzmf/pub?gid=811823167&single=true&output=csv';
    const FC_ORDER = ['EWR','FTW','JAX','MKE','MEM','OAK','RNO','SMF'];
    const FC_COLORS = { EWR:'#378ADD', FTW:'#7F77DD', JAX:'#BA7517', MKE:'#D85A30', MEM:'#1D9E75', OAK:'#D4537E', RNO:'#639922', SMF:'#888780' };
    const LIMIT_3_WEEKS = ['RNO','SMF'];
 
    function parseCSV(text) {
      return text.trim().split('\n').map(row => {
        const cols = []; let cur = '', inQ = false;
        for (let i = 0; i < row.length; i++) {
          const ch = row[i];
          if (ch === '"') { inQ = !inQ; }
          else if (ch === ',' && !inQ) { cols.push(cur.trim()); cur = ''; }
          else { cur += ch; }
        }
        cols.push(cur.trim());
        return cols;
      });
    }
 
    function utilColor(v) { return v >= 100 ? '#c0392b' : v >= 85 ? '#e67e22' : '#27ae60'; }
    function netColor(v)  { return v < 0 ? '#c0392b' : v < 150 ? '#e67e22' : '#27ae60'; }
    function wohColor(v)  {
      if (v < 2.5) return '#c0392b';
      if (v < 4)   return '#e67e22';
      if (v < 7)   return '#27ae60';
      return '#7F77DD';
    }
 
    function switchTab(tab) {
      document.getElementById('view-summary').style.display = tab === 'summary' ? '' : 'none';
      document.getElementById('view-detail').style.display = tab === 'detail' ? '' : 'none';
      document.getElementById('tab-summary').classList.toggle('active', tab === 'summary');
      document.getElementById('tab-detail').classList.toggle('active', tab === 'detail');
    }
 
    fetch(ST_URL)
      .then(r => { if (!r.ok) throw new Error('HTTP ' + r.status); return r.text(); })
      .then(text => {
        const rows = parseCSV(text);
        const weeks = rows[0].slice(2);
        const utilRows = rows.filter(r => r[0] === 'util');
        const netRows  = rows.filter(r => r[0] === 'net');
        const wohRows  = rows.filter(r => r[0] === 'woh');
 
        const shortWeek = w => w.replace('/2026', '');
 
        document.getElementById('subtitle').textContent = 'Next 5 weeks · ' + shortWeek(weeks[0]) + ' – ' + shortWeek(weeks[weeks.length - 1]);
        document.getElementById('status').textContent = 'Live from Google Sheets · refreshes on page load';
 
        // Build summary header
        const headerRow = document.getElementById('summary-header');
        weeks.forEach(w => {
          const th = document.createElement('th');
          th.className = 'week-col';
          th.textContent = shortWeek(w);
          headerRow.appendChild(th);
        });
 
        // Build summary rows
        const tbody = document.getElementById('summary-body');
        FC_ORDER.forEach(fc => {
          const uRow = utilRows.find(r => r[1] === fc);
          if (!uRow) return;
          const limit = LIMIT_3_WEEKS.includes(fc) ? 3 : weeks.length;
          const uVals = uRow.slice(2).map(v => parseFloat(v.replace('%', '')));
          const color = FC_COLORS[fc] || '#888';
 
          const tr = document.createElement('tr');
          let html = '<td class="fc-name"><span class="fc-dot-sm" style="background:' + color + '"></span>' + fc + '</td>';
          weeks.forEach((w, i) => {
            if (i < limit) {
              html += '<td class="util-val" style="color:' + utilColor(uVals[i]) + ';">' + uVals[i].toFixed(1) + '%</td>';
            } else {
              html += '<td class="na-val">—</td>';
            }
          });
          tr.innerHTML = html;
          tbody.appendChild(tr);
        });
 
        // Build detail cards
        const content = document.getElementById('content');
        FC_ORDER.forEach(fc => {
          const uRow = utilRows.find(r => r[1] === fc);
          const nRow = netRows.find(r => r[1] === fc);
          const wRow = wohRows.find(r => r[1] === fc);
          if (!uRow) return;
 
          const limit = LIMIT_3_WEEKS.includes(fc) ? 3 : weeks.length;
          const uVals = uRow.slice(2).map(v => parseFloat(v.replace('%', '')));
          const nVals = nRow ? nRow.slice(2).map(v => Math.round(parseFloat(v.replace(/[,%]/g, '')))) : [];
          const wVals = wRow ? wRow.slice(2).map(v => parseFloat(v.replace('%', '')).toFixed(1)) : [];
 
          const card = document.createElement('div');
          card.className = 'fc-card';
          const color = FC_COLORS[fc] || '#888';
 
          let html = '<div class="fc-header"><span class="fc-dot" style="background:' + color + '"></span>' + fc + '</div>';
          html += '<table><thead><tr><th class="col-label"></th>';
          html += weeks.map(w => '<th>' + shortWeek(w) + '</th>').join('');
          html += '</tr></thead><tbody>';
 
          // Utilization row
          html += '<tr><td class="row-label">Utilization %</td>';
          html += weeks.map((w, i) => i < limit
            ? '<td><span class="val-cell" style="color:' + utilColor(uVals[i]) + '">' + uVals[i].toFixed(1) + '%</span></td>'
            : '<td><span class="na-cell">—</span></td>'
          ).join('');
          html += '</tr>';
 
          // Net pallets row
          html += '<tr><td class="row-label">Net Avail Pallets</td>';
          html += weeks.map((w, i) => i < limit
            ? '<td><span class="val-cell" style="color:' + netColor(nVals[i]) + '">' + nVals[i].toLocaleString() + '</span></td>'
            : '<td><span class="na-cell">—</span></td>'
          ).join('');
          html += '</tr>';
 
          // WOH row
          html += '<tr><td class="row-label">WOH</td>';
          html += weeks.map((w, i) => i < limit
            ? '<td><span class="val-cell" style="color:' + wohColor(parseFloat(wVals[i])) + '">' + wVals[i] + '</span></td>'
            : '<td><span class="na-cell">—</span></td>'
          ).join('');
          html += '</tr>';
 
          html += '</tbody></table>';
          card.innerHTML = html;
          content.appendChild(card);
        });
      })
      .catch(err => {
        document.getElementById('content').innerHTML = '<div class="error">Could not load data: ' + err.message + '</div>';
      });
  </script>
</body>
</html>
