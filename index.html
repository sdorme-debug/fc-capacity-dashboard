<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FC Projected Capacity Need</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f9f9f8; color: #1a1a1a; padding: 24px; }
    h1 { font-size: 16px; font-weight: 500; color: #444; margin-bottom: 4px; }
    .subtitle { font-size: 12px; color: #888; margin-bottom: 20px; }
    .metric-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(100px, 1fr)); gap: 8px; margin-bottom: 20px; }
    .metric { background: #fff; border: 0.5px solid rgba(0,0,0,0.1); border-radius: 8px; padding: 10px 14px; }
    .metric-label { font-size: 11px; color: #888; margin-bottom: 4px; }
    .metric-value { font-size: 20px; font-weight: 500; }
    .chart-card { background: #fff; border: 0.5px solid rgba(0,0,0,0.1); border-radius: 12px; padding: 20px; margin-bottom: 16px; }
    .chart-title { font-size: 13px; font-weight: 500; color: #444; margin-bottom: 12px; }
    .legend { display: flex; flex-wrap: wrap; gap: 12px; margin-bottom: 14px; font-size: 12px; color: #666; }
    .legend-item { display: flex; align-items: center; gap: 5px; }
    .status { font-size: 11px; color: #aaa; margin-top: 12px; }
    .error { color: #c0392b; font-size: 13px; padding: 12px; background: #fdf0ee; border-radius: 8px; }
    table { width: 100%; border-collapse: collapse; font-size: 12px; }
    th { text-align: left; padding: 8px 10px; color: #888; font-weight: 500; border-bottom: 0.5px solid rgba(0,0,0,0.1); }
    td { padding: 8px 10px; border-bottom: 0.5px solid rgba(0,0,0,0.06); }
    tr:last-child td { border-bottom: none; }
    .fc-label { font-weight: 500; color: #444; }
    .pos { color: #27ae60; } .yellow { color: #d4ac0d; } .warn { color: #e67e22; } .neg { color: #c0392b; }
  </style>
</head>
<body>
  <h1>Projected capacity need — Optimal WOH</h1>
  <p class="subtitle" id="subtitle">Loading...</p>
  <div class="metric-grid" id="metrics"></div>
  <div class="chart-card">
    <div class="chart-title">Utilization % by FC</div>
    <div class="legend" id="legend"></div>
    <div style="position: relative; height: 320px;">
      <canvas id="utilChart" role="img" aria-label="Projected utilization % by FC at optimal WOH"></canvas>
    </div>
  </div>
  <div class="chart-card">
    <div class="chart-title">Net available pallets by FC</div>
    <table id="netTable"><thead><tr id="netHead"></tr></thead><tbody id="netBody"></tbody></table>
  </div>
  <p class="status" id="status"></p>

  <script>
    const LT_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSUt2yHzlksCU-YIaqCmYEY_17m_xixMauuYuE7e3OjHdZepZtFcUJjyPtZCc1PVYFgT9hK7L6Vd2qO/pub?gid=1170561156&single=true&output=csv';

    const FC_STYLES = {
      EWR: { color: '#378ADD', dash: [] },
      MEM: { color: '#1D9E75', dash: [6,3] },
      MKE: { color: '#D85A30', dash: [3,3] },
      JAX: { color: '#BA7517', dash: [8,3] },
      FTW: { color: '#7F77DD', dash: [4,2,1,2] },
      OAK: { color: '#D4537E', dash: [2,2] },
    };

    const MONTH_NAMES = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

    function parseCSV(t) { return t.trim().split('\n').map(r => r.split(',').map(c => c.trim().replace(/^"|"$/g,''))); }

    function parseMonthLabel(label) {
      // Try "M/D/YYYY" format (e.g. "4/1/2026")
      const slashMatch = label.match(/^(\d{1,2})\/\d{1,2}\/(\d{4})$/);
      if (slashMatch) return new Date(parseInt(slashMatch[2]), parseInt(slashMatch[1]) - 1, 1);
      // Try "Mon" format (e.g. "Apr") — assume current or next year
      const monthIdx = MONTH_NAMES.indexOf(label.trim());
      if (monthIdx !== -1) {
        const today = new Date();
        const year = monthIdx < today.getMonth() ? today.getFullYear() + 1 : today.getFullYear();
        return new Date(year, monthIdx, 1);
      }
      // Try "Mon YYYY" format
      const spaceMatch = label.match(/^([A-Za-z]{3})\s+(\d{4})$/);
      if (spaceMatch) {
        const idx = MONTH_NAMES.indexOf(spaceMatch[1]);
        if (idx !== -1) return new Date(parseInt(spaceMatch[2]), idx, 1);
      }
      return null;
    }

    function formatMonthLabel(d) {
      return MONTH_NAMES[d.getMonth()] + ' ' + d.getFullYear();
    }

    // Start = first day of 2 months from now
    const today = new Date();
    const cutoff = new Date(today.getFullYear(), today.getMonth() + 2, 1);

    fetch(LT_URL)
      .then(r => { if(!r.ok) throw new Error('HTTP '+r.status); return r.text(); })
      .then(text => {
        const rows = parseCSV(text);
        const allMonths = rows[0].slice(2);
        const utilRows = rows.filter(r => r[0]==='util');
        const netRows  = rows.filter(r => r[0]==='net');

        // Parse all month labels sequentially, incrementing year when month wraps
const parsedDates = [];
let year = today.getFullYear();
let lastMonthIdx = -1;
allMonths.forEach(m => {
  const slashMatch = m.match(/^(\d{1,2})\/\d{1,2}\/(\d{4})$/);
  if (slashMatch) {
    parsedDates.push(new Date(parseInt(slashMatch[2]), parseInt(slashMatch[1]) - 1, 1));
    lastMonthIdx = parseInt(slashMatch[1]) - 1;
    year = parseInt(slashMatch[2]);
  } else {
    const monthIdx = MONTH_NAMES.indexOf(m.trim());
    if (monthIdx !== -1) {
      if (monthIdx <= lastMonthIdx) year++;
      lastMonthIdx = monthIdx;
      parsedDates.push(new Date(year, monthIdx, 1));
    } else {
      parsedDates.push(null);
    }
  }
});

const validIndices = parsedDates.map((d, i) => d && d >= cutoff ? i : null).filter(i => i !== null);
const months = validIndices.map(i => parsedDates[i] ? formatMonthLabel(parsedDates[i]) : allMonths[i]);

        if (months.length === 0) {
          document.getElementById('subtitle').textContent = 'No data available beyond 2 months out — check Dashboard Export tab';
          return;
        }

        document.getElementById('subtitle').textContent = months[0] + ' – ' + months[months.length-1];
        document.getElementById('status').textContent = 'Live from Google Sheets · refreshes on page load';

        // Metric cards — peak util per FC, and keep util values around for the net-pallets table coloring
        const metricsEl = document.getElementById('metrics');
        const utilByFc = {};
        utilRows.forEach(r => {
          const fc = r[1];
          const allVals = r.slice(2);
          const vals = validIndices.map(i => Math.round(parseFloat(allVals[i]) * 10000) / 100);
          utilByFc[fc] = vals;
          const maxVal = Math.max(...vals);
          const maxMonth = months[vals.indexOf(maxVal)];
          const color = maxVal >= 90 ? '#c0392b' : maxVal >= 75 ? '#e67e22' : '#27ae60';
          metricsEl.innerHTML += '<div class="metric"><div class="metric-label">'+fc+' peak ('+maxMonth+')</div><div class="metric-value" style="color:'+color+'">'+maxVal.toFixed(1)+'%</div></div>';
        });

        // Legend
        const legendEl = document.getElementById('legend');
        utilRows.forEach(r => {
          const fc = r[1];
          const s = FC_STYLES[fc]||{color:'#888'};
          legendEl.innerHTML += '<div class="legend-item"><span style="display:inline-block;width:20px;height:2px;background:'+s.color+'"></span>'+fc+'</div>';
        });

        // Util chart
        new Chart(document.getElementById('utilChart'), {
          type: 'line',
          data: {
            labels: months,
            datasets: [
              ...utilRows.map(r => {
                const fc = r[1]; const s = FC_STYLES[fc]||{color:'#888',dash:[]};
                const allVals = r.slice(2);
                return { label: fc, data: validIndices.map(i => Math.round(parseFloat(allVals[i]) * 10000) / 100), borderColor: s.color, backgroundColor: 'transparent', borderWidth: 2, borderDash: s.dash, pointRadius: 3, pointBackgroundColor: s.color, tension: 0.3 };
              }),
              { label: '100% cap', data: Array(months.length).fill(100), borderColor: '#e74c3c', borderWidth: 1.5, borderDash: [4,4], pointRadius: 0, backgroundColor: 'transparent' }
            ]
          },
          options: {
            responsive: true, maintainAspectRatio: false,
            interaction: { mode: 'index', intersect: false },
            plugins: { legend: { display: false }, tooltip: { callbacks: { label: ctx => ctx.dataset.label+': '+ctx.parsed.y.toFixed(1)+'%' } } },
            scales: {
              y: { min: 0, max: 110, ticks: { callback: v => v+'%', font: { size: 11 } }, grid: { color: 'rgba(0,0,0,0.06)' } },
              x: { ticks: { font: { size: 11 }, autoSkip: false }, grid: { display: false } }
            }
          }
        });

        // Net pallets table — colored by that FC/month's utilization %, not raw pallet count
        // Negative pallets always show red regardless of utilization.
        function netCellClass(util, netVal) {
          if (netVal < 0) return 'neg';
          if (util >= 95) return 'warn';   // orange
          if (util >= 90) return 'yellow'; // yellow
          return 'pos';                    // green
        }

        const head = document.getElementById('netHead');
        head.innerHTML = '<th>FC</th>' + months.map(m => '<th>'+m+'</th>').join('');
        const body = document.getElementById('netBody');
        netRows.forEach(r => {
          const fc = r[1];
          const allVals = r.slice(2);
          const fcUtilVals = utilByFc[fc] || [];
          const cells = validIndices.map((idx, i) => {
            const n = Math.round(parseFloat(allVals[idx]));
            const util = fcUtilVals[i] !== undefined ? fcUtilVals[i] : 0;
            const cls = netCellClass(util, n);
            return '<td class="'+cls+'">'+n.toLocaleString()+'</td>';
          }).join('');
          body.innerHTML += '<tr><td class="fc-label">'+fc+'</td>'+cells+'</tr>';
        });
      })
      .catch(err => { document.getElementById('metrics').innerHTML = '<div class="error">Could not load data: '+err.message+'</div>'; });
  </script>
</body>
</html>
