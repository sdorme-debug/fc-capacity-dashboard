<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FC Freezer Capacity Dashboard</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f9f9f8; color: #1a1a1a; padding: 24px; }
    h1 { font-size: 16px; font-weight: 500; color: #444; margin-bottom: 4px; }
    .subtitle { font-size: 12px; color: #888; margin-bottom: 20px; }
    .metric-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(100px, 1fr)); gap: 8px; margin-bottom: 20px; }
    .metric { background: #fff; border: 0.5px solid rgba(0,0,0,0.1); border-radius: 8px; padding: 10px 14px; }
    .metric-label { font-size: 11px; color: #888; margin-bottom: 4px; }
    .metric-value { font-size: 20px; font-weight: 500; }
    .chart-card { background: #fff; border: 0.5px solid rgba(0,0,0,0.1); border-radius: 12px; padding: 20px; margin-bottom: 16px; }
    .chart-title { font-size: 13px; font-weight: 500; color: #444; margin-bottom: 12px; }
    .legend { display: flex; flex-wrap: wrap; gap: 12px; margin-bottom: 14px; font-size: 12px; color: #666; }
    .legend-item { display: flex; align-items: center; gap: 5px; }
    .status { font-size: 11px; color: #aaa; margin-top: 12px; }
    .error { color: #c0392b; font-size: 13px; padding: 12px; background: #fdf0ee; border-radius: 8px; }
  </style>
</head>
<body>
  <h1>Freezer capacity — long term view</h1>
  <p class="subtitle" id="subtitle">Loading...</p>
  <div class="metric-grid" id="metrics"></div>
  <div class="chart-card">
    <div class="chart-title">Utilization % by FC</div>
    <div class="legend" id="legend"></div>
    <div style="position: relative; height: 320px;">
      <canvas id="utilChart" role="img" aria-label="Utilization chart"></canvas>
    </div>
  </div>
  <div class="chart-card">
    <div class="chart-title">Net available pallets by FC</div>
    <div style="position: relative; height: 260px;">
      <canvas id="netChart" role="img" aria-label="Net pallets chart"></canvas>
    </div>
  </div>
  <p class="status" id="status"></p>
  <script>
    const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSUt2yHzlksCU-YIaqCmYEY_17m_xixMauuYuE7e3OjHdZepZtFcUJjyPtZCc1PVYFgT9hK7L6Vd2qO/pub?gid=1170561156&single=true&output=csv';
    const FC_STYLES = {
      EWR: { color: '#378ADD', dash: [] },
      MEM: { color: '#1D9E75', dash: [6,3] },
      MKE: { color: '#D85A30', dash: [3,3] },
      JAX: { color: '#BA7517', dash: [8,3] },
      FTW: { color: '#7F77DD', dash: [4,2,1,2] },
      OAK: { color: '#D4537E', dash: [2,2] },
    };
    function parseCSV(text) {
      return text.trim().split('\n').map(r => r.split(',').map(c => c.trim().replace(/^"|"$/g, '')));
    }
    fetch(CSV_URL)
      .then(r => { if (!r.ok) throw new Error('HTTP ' + r.status); return r.text(); })
      .then(text => {
        const rows = parseCSV(text);
        const months = rows[0].slice(2);
        const utilRows = rows.filter(r => r[0] === 'util');
        const netRows  = rows.filter(r => r[0] === 'net');
        document.getElementById('subtitle').textContent = 'Frozen pallets · ' + months[0] + ' to ' + months[months.length - 1];
        document.getElementById('status').textContent = 'Live from Google Sheets · refreshes on page load';
        const metricsEl = document.getElementById('metrics');
        utilRows.forEach(r => {
          const fc = r[1];
          const val = Math.round(parseFloat(r[r.length - 1]) * 100);
          const color = val >= 90 ? '#c0392b' : val >= 75 ? '#e67e22' : '#27ae60';
          metricsEl.innerHTML += '<div class="metric"><div class="metric-label">' + fc + ' ' + months[months.length-1] + '</div><div class="metric-value" style="color:' + color + '">' + val + '%</div></div>';
        });
        const legendEl = document.getElementById('legend');
        utilRows.forEach(r => {
          const fc = r[1];
          const s = FC_STYLES[fc] || { color: '#888' };
          legendEl.innerHTML += '<div class="legend-item"><span style="display:inline-block;width:20px;height:2px;background:' + s.color + ';"></span>' + fc + '</div>';
        });
        new Chart(document.getElementById('utilChart'), {
          type: 'line',
          data: {
            labels: months,
            datasets: [
              ...utilRows.map(r => {
                const fc = r[1];
                const s = FC_STYLES[fc] || { color: '#888', dash: [] };
                return { label: fc, data: r.slice(2).map(v => Math.round(parseFloat(v) * 1000) / 10), borderColor: s.color, backgroundColor: 'transparent', borderWidth: 2, borderDash: s.dash, pointRadius: 3, pointBackgroundColor: s.color, tension: 0.3 };
              }),
              { label: '100% cap', data: Array(months.length).fill(100), borderColor: '#e74c3c', borderWidth: 1.5, borderDash: [4,4], pointRadius: 0, backgroundColor: 'transparent' }
            ]
          },
          options: {
            responsive: true, maintainAspectRatio: false,
            interaction: { mode: 'index', intersect: false },
            plugins: { legend: { display: false }, tooltip: { callbacks: { label: ctx => ctx.dataset.label + ': ' + ctx.parsed.y.toFixed(1) + '%' } } },
            scales: {
              y: { min: 0, max: 110, ticks: { callback: v => v + '%', font: { size: 11 } }, grid: { color: 'rgba(0,0,0,0.06)' } },
              x: { ticks: { font: { size: 11 }, autoSkip: false }, grid: { display: false } }
            }
          }
        });
        new Chart(document.getElementById('netChart'), {
          type: 'bar',
          data: {
            labels: months,
            datasets: netRows.map(r => {
              const fc = r[1];
              const s = FC_STYLES[fc] || { color: '#888' };
              return { label: fc, data: r.slice(2).map(v => Math.round(parseFloat(v))), backgroundColor: s.color + '99', borderColor: s.color, borderWidth: 1 };
            })
          },
          options: {
            responsive: true, maintainAspectRatio: false,
            interaction: { mode: 'index', intersect: false },
            plugins: { legend: { labels: { font: { size: 11 }, boxWidth: 12 } } },
            scales: {
              y: { ticks: { font: { size: 11 } }, grid: { color: 'rgba(0,0,0,0.06)' } },
              x: { ticks: { font: { size: 11 }, autoSkip: false }, grid: { display: false } }
            }
          }
        });
      })
      .catch(err => {
        document.getElementById('subtitle').textContent = '';
        document.getElementById('metrics').innerHTML = '<div class="error">Could not load data: ' + err.message + '. Make sure the Google Sheet is published to web.</div>';
      });
  </script>
</body>
</html>
