<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Inbound Truckload Forecast</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#F4F7F8; --panel:#FFFFFF; --ink:#13242C; --muted:#5C7079;
    --line:#E0E8EA; --accent:#0FA9BD; --accent-deep:#0A4A5A;
    --lo:#ECF5F6; --hi:#093F4E; --zero:#F1F5F5;
    --radius:14px;
  }
  @media (prefers-reduced-motion: reduce){ *{transition:none!important} }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{
    background:var(--bg); color:var(--ink);
    font-family:"Inter",system-ui,sans-serif;
    -webkit-font-smoothing:antialiased;
    padding:32px 28px 64px;
  }
  .wrap{max-width:1180px;margin:0 auto}

  .masthead{display:flex;justify-content:space-between;align-items:flex-end;gap:24px;flex-wrap:wrap;
    border-bottom:2px solid var(--ink);padding-bottom:16px;margin-bottom:26px}
  .eyebrow{font-family:"Space Grotesk";font-weight:600;letter-spacing:.18em;text-transform:uppercase;
    font-size:11px;color:var(--accent-deep);margin:0 0 6px}
  h1{font-family:"Space Grotesk";font-weight:700;font-size:34px;line-height:1.02;margin:0;letter-spacing:-.01em}
  .sub{color:var(--muted);font-size:13.5px;margin:8px 0 0;max-width:46ch}
  .stamp{font-family:"Space Grotesk";font-size:12px;color:var(--muted);text-align:right;line-height:1.5;white-space:nowrap}
  .stamp b{color:var(--ink);font-weight:600}

  .controls{display:flex;gap:18px;align-items:center;flex-wrap:wrap;margin-bottom:18px}
  .seg{display:inline-flex;background:var(--panel);border:1px solid var(--line);border-radius:11px;padding:4px;gap:2px}
  .seg button{font-family:"Space Grotesk";font-weight:600;font-size:13px;color:var(--muted);
    background:none;border:0;padding:8px 15px;border-radius:8px;cursor:pointer;transition:.15s}
  .seg button:hover{color:var(--ink)}
  .seg button[aria-pressed="true"]{background:var(--ink);color:#fff}
  .grp{display:flex;align-items:center;gap:8px}
  .grp label{font-size:12px;color:var(--muted);font-weight:500}
  select{font-family:"Inter";font-size:13px;color:var(--ink);background:var(--panel);
    border:1px solid var(--line);border-radius:9px;padding:8px 11px;cursor:pointer}
  .legend{margin-left:auto;display:flex;align-items:center;gap:9px;font-size:11px;color:var(--muted);
    font-family:"Space Grotesk"}
  .legend .bar{width:120px;height:9px;border-radius:5px;
    background:linear-gradient(90deg,var(--lo),#5fa6b1,var(--hi))}

  .board{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);
    padding:6px;overflow-x:auto}
  .msg{padding:54px 28px;text-align:center;font-family:"Space Grotesk";font-size:14px;color:var(--muted);line-height:1.6}
  .msg.err{color:#b5454a}
  .msg .spin{display:inline-block;width:15px;height:15px;border:2px solid var(--line);border-top-color:var(--accent);
    border-radius:50%;animation:sp .7s linear infinite;vertical-align:-3px;margin-right:8px}
  @keyframes sp{to{transform:rotate(360deg)}}
  .banner{display:flex;align-items:center;gap:6px;background:#FFF7E0;border:1px solid #F0E2A8;color:#7a611c;
    font-family:"Space Grotesk";font-size:12.5px;font-weight:500;padding:10px 14px;border-radius:11px;margin-bottom:14px}
  .banner b{color:#5a4612;font-weight:700}
  .grid{display:grid;gap:3px;min-width:760px}
  .cell{font-family:"Space Grotesk";font-variant-numeric:tabular-nums;font-size:12.5px;
    display:flex;align-items:center;justify-content:center;height:34px;border-radius:6px;transition:.12s}
  .hcell{color:var(--muted);font-weight:600;font-size:10.5px;letter-spacing:.06em;text-transform:uppercase;
    justify-content:center;height:30px;cursor:default}
  .rowlab{justify-content:flex-start;padding-left:12px;font-weight:600;font-size:12.5px;color:var(--ink);
    background:var(--bg);position:sticky;left:0;z-index:1}
  .corner{background:var(--bg)}
  .val{cursor:default;font-weight:500}
  .val:hover{outline:2px solid var(--accent);outline-offset:-2px}
  .val.peak{box-shadow:inset 0 0 0 2px var(--accent)}
  .avg{font-weight:700;color:var(--accent-deep);background:transparent}
  .avgh{color:var(--accent-deep)}

  .tip{position:fixed;pointer-events:none;background:var(--ink);color:#fff;font-family:"Space Grotesk";
    font-size:12px;padding:7px 10px;border-radius:8px;opacity:0;transform:translateY(4px);transition:.1s;z-index:9;
    white-space:nowrap}
  .tip b{color:#8fe7f2}

  .loader{margin-top:26px;background:var(--panel);border:1px solid var(--line);border-radius:var(--radius)}
  .loader summary{cursor:pointer;list-style:none;padding:15px 18px;font-family:"Space Grotesk";font-weight:600;
    font-size:14px;display:flex;align-items:center;gap:9px}
  .loader summary::-webkit-details-marker{display:none}
  .loader summary::before{content:"+";color:var(--accent);font-size:18px;line-height:1}
  .loader[open] summary::before{content:"–"}
  .loader .body{padding:0 18px 18px}
  .loader p{font-size:13px;color:var(--muted);line-height:1.55;margin:0 0 12px}
  .loader code{background:var(--bg);padding:1px 5px;border-radius:4px;font-size:12px;color:var(--ink)}
  textarea{width:100%;height:120px;border:1px solid var(--line);border-radius:9px;padding:11px;
    font-family:ui-monospace,monospace;font-size:12px;resize:vertical;color:var(--ink)}
  .actions{display:flex;align-items:center;gap:12px;margin-top:11px}
  .btn{font-family:"Space Grotesk";font-weight:600;font-size:13px;background:var(--ink);color:#fff;
    border:0;border-radius:9px;padding:10px 18px;cursor:pointer}
  .btn:hover{background:var(--accent-deep)}
  .status{font-size:12.5px;color:var(--muted)}
  .status.ok{color:var(--accent-deep);font-weight:600}
  .status.err{color:#b5454a;font-weight:600}
  .samplenote{font-family:"Space Grotesk";font-size:11px;color:var(--muted);background:#fff5d6;
    border:1px solid #f0e2a8;border-radius:7px;padding:4px 10px;display:inline-block}
</style>
</head>
<body>
<div class="wrap">
  <header class="masthead">
    <div>
      <p class="eyebrow">Network Logistics · Monthly View</p>
      <h1>Inbound Truckload Forecast</h1>
      <p class="sub">Average truckloads per week, rolled to a monthly view. Switch the metric and the breakdown — darker cells run hotter.</p>
    </div>
    <div class="stamp">Jun 2026 – Jun 2027<br><b id="srcLabel">Connecting…</b></div>
  </header>

  <div class="controls" id="controls" style="display:none">
    <div class="seg" id="metricSeg"></div>
    <div class="grp"><label for="groupSel">Break down</label><select id="groupSel"></select></div>
    <div class="grp" id="focusGrp" style="display:none"><label for="focusSel" id="focusLab">FC</label><select id="focusSel"></select></div>
    <div class="legend"><span id="legLo">0</span><span class="bar"></span><span id="legHi">—</span></div>
  </div>

  <div class="board"><div class="grid" id="grid"></div></div>

</div>
<div class="tip" id="tip"></div>

<script>
const DAYS=["SUN","MON","TUE","WED","THU","FRI","SAT"];
const SECTIONS=["Total TLs","Coman PUs","FC Inbounds"];

// ---- view config: which column is the grouping key for each metric ----
const VIEWS={
  "Total TLs":[{label:"By FC",key:"c"},{label:"By co-man / supplier",key:"b"},{label:"Co-man — by FC",key:"b",focusKey:"c",focusLabel:"FC"}],
  "Coman PUs":[{label:"By co-man / supplier",key:"c"},{label:"Day of week — by co-man",key:"b",focusKey:"c",focusLabel:"Co-man"}],
  "FC Inbounds":[{label:"By FC",key:"c"},{label:"Day of week — by FC",key:"b",focusKey:"c",focusLabel:"FC"}]
};

let DATA=null;
let metric="Total TLs", groupIdx=0, focus="";

// ---- color scale ----
function hx(h){h=h.replace("#","");return[parseInt(h.slice(0,2),16),parseInt(h.slice(2,4),16),parseInt(h.slice(4,6),16)];}
const LO=hx("#ECF5F6"), HI=hx("#093F4E");
function color(t){t=Math.max(0,Math.min(1,t));const c=LO.map((a,i)=>Math.round(a+(HI[i]-a)*t));return`rgb(${c[0]},${c[1]},${c[2]})`;}

// ---- aggregate records -> {groups:[{label,values[],total}], max} ----
function aggregate(){
  const view=VIEWS[metric][groupIdx], key=view.key;
  let rows=DATA.recs.filter(r=>r.section===metric);
  if(view.focusKey && focus && focus!=="__ALL__") rows=rows.filter(r=>r[view.focusKey]===focus);
  const map={};
  rows.forEach(r=>{const g=r[key]; if(!map[g])map[g]=DATA.months.map(()=>0);
    r.values.forEach((v,i)=>map[g][i]+=(v||0));});
  let groups=Object.keys(map).map(label=>{
    const values=map[label]; const total=values.reduce((a,b)=>a+b,0);
    return{label,values,total,avg:total/(values.length||1)};});
  // day-of-week views keep calendar order; everything else sorts by volume
  if(key==="b" && metric!=="Total TLs"){
    groups.sort((a,b)=>DAYS.indexOf(a.label)-DAYS.indexOf(b.label));
  } else { groups.sort((a,b)=>b.total-a.total); }
  const max=Math.max(1,...groups.flatMap(g=>g.values));
  return{groups,max};
}

// ---- render ----
const grid=document.getElementById("grid");
const tip=document.getElementById("tip");
function render(){
  const {groups,max}=aggregate();
  const n=DATA.months.length;
  grid.style.gridTemplateColumns=`minmax(120px,1.4fr) repeat(${n},1fr) minmax(56px,0.7fr)`;
  let html=`<div class="cell hcell corner"></div>`;
  DATA.months.forEach(m=>html+=`<div class="cell hcell">${m}</div>`);
  html+=`<div class="cell hcell avgh">Avg</div>`;
  groups.forEach(g=>{
    html+=`<div class="cell rowlab">${g.label}</div>`;
    g.values.forEach((v,i)=>{
      const t=v/max, isPeak=(v===max&&max>1);
      const txt=t>0.58?"#eaf6f7":"#13242c";
      const bg=v<=0?"var(--zero)":color(t);
      html+=`<div class="cell val${isPeak?" peak":""}" style="background:${bg};color:${txt}" `+
        `data-g="${g.label}" data-m="${DATA.months[i]}" data-v="${Math.round(v)}">${Math.round(v)}</div>`;
    });
    html+=`<div class="cell avg">${Math.round(g.avg)}</div>`;
  });
  grid.innerHTML=html;
  document.getElementById("legHi").textContent=Math.round(max);
}

// metric segmented control
const seg=document.getElementById("metricSeg");
SECTIONS.forEach(s=>{const b=document.createElement("button");b.textContent=s;
  b.onclick=()=>{metric=s;groupIdx=(s==="Total TLs")?0:1;focus="";syncControls();render();};seg.appendChild(b);});
const groupSel=document.getElementById("groupSel");
const focusGrp=document.getElementById("focusGrp"),focusSel=document.getElementById("focusSel"),focusLab=document.getElementById("focusLab");
function syncControls(){
  [...seg.children].forEach(b=>b.setAttribute("aria-pressed",b.textContent===metric));
  groupSel.innerHTML="";
  VIEWS[metric].forEach((v,i)=>{const o=document.createElement("option");o.value=i;o.textContent=v.label;groupSel.appendChild(o);});
  groupSel.value=groupIdx;
  const view=VIEWS[metric][groupIdx];
  if(view.focusKey){
    focusGrp.style.display="";
    focusLab.textContent = view.focusLabel || "Focus";
    const ents=[...new Set(DATA.recs.filter(r=>r.section===metric).map(r=>r[view.focusKey]))];
    focusSel.innerHTML="";
    ents.forEach(e=>{const o=document.createElement("option");o.value=e;o.textContent=e;focusSel.appendChild(o);});
    const all=document.createElement("option");all.value="__ALL__";all.textContent="All combined";focusSel.appendChild(all);
    if(![...focusSel.options].some(o=>o.value===focus)) focus = ents[0] || "__ALL__";
    focusSel.value=focus;
  } else { focusGrp.style.display="none"; }
}
groupSel.onchange=e=>{groupIdx=+e.target.value;syncControls();render();};
focusSel.onchange=e=>{focus=e.target.value;render();};

// tooltip
grid.addEventListener("mousemove",e=>{
  const c=e.target.closest(".val");
  if(!c){tip.style.opacity=0;return;}
  tip.innerHTML=`${c.dataset.g} · ${c.dataset.m} — <b>${c.dataset.v} TL/wk</b>`;
  tip.style.opacity=1;tip.style.left=(e.clientX+14)+"px";tip.style.top=(e.clientY-10)+"px";
});
grid.addEventListener("mouseleave",()=>tip.style.opacity=0);

// ====================================================================
//  LIVE DATA — paste your published-to-web CSV link between the quotes:
//  Sheet → File → Share → Publish to web → "Truckload Forecast" tab →
//  CSV → Publish, then copy the link (it ends in output=csv).
//  Leave it blank ("") to use the manual paste box instead.
const SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRgqmVRirhaQ3AKoXv3nRKc1VK7DFlEkUQgfCLBINLi0nYD7zeapoRu7lY4pYP87MarrwiboOXjtzmf/pub?gid=1722743767&single=true&output=csv";
// ====================================================================

function pd(s){const d=new Date((s||"").trim());return isNaN(d)?null:d;}
function fmtMonth(d){return d.toLocaleString("en-US",{month:"short"})+" ’"+String(d.getFullYear()).slice(2);}

// turn a 2-D grid (rows of cells) into {months, recs} or {error}
function parseGrid(grid){
  if(!grid.length) return {error:"No rows to read."};
  let cols=[],labels=[];
  for(const row of grid){
    const day1=[];
    for(let i=3;i<row.length;i++){const d=pd(row[i]); if(d&&d.getDate()===1)day1.push({i,d});}
    if(day1.length>=3){ // longest run of columns that are BOTH adjacent and consecutive months
      const mo=x=>x.d.getFullYear()*12+x.d.getMonth();
      let best=[],run=[day1[0]];
      for(let k=1;k<day1.length;k++){
        if(day1[k].i===day1[k-1].i+1 && mo(day1[k])-mo(day1[k-1])===1)run.push(day1[k]);
        else{if(run.length>best.length)best=run;run=[day1[k]];}
      }
      if(run.length>best.length)best=run;
      cols=best.map(x=>x.i); labels=best.map(x=>fmtMonth(x.d)); break;
    }
  }
  if(!cols.length) return {error:"Couldn’t find the month columns. Make sure the dated header row (with the 1st-of-month dates) is included."};
  const recs=[];
  for(const row of grid){
    const sec=(row[0]||"").trim(); if(!SECTIONS.includes(sec)) continue;
    const b=(row[1]||"").trim(), c=(row[2]||"").trim(); if(!b||!c) continue;
    const values=cols.map(i=>{const n=parseFloat((row[i]||"").replace(/[^0-9.\-]/g,""));return isNaN(n)?0:n;});
    recs.push({section:sec,b,c,values});
  }
  if(!recs.length) return {error:"Found the months but no data rows. Need section in A, day/coman in B, FC in C."};
  return {months:labels,recs};
}

const splitTSV = t => t.replace(/\r/g,"").split("\n").filter(l=>l.length).map(l=>l.split("\t"));
function parseCSV(text){
  const rows=[]; let row=[],f="",q=false; text=text.replace(/\r/g,"");
  for(let i=0;i<text.length;i++){const ch=text[i];
    if(q){ if(ch==='"'){ if(text[i+1]==='"'){f+='"';i++;} else q=false; } else f+=ch; }
    else { if(ch==='"')q=true; else if(ch===','){row.push(f);f="";}
           else if(ch==='\n'){row.push(f);rows.push(row);row=[];f="";} else f+=ch; }
  }
  if(f.length||row.length){row.push(f);rows.push(row);}
  return rows.filter(r=>r.some(c=>c!==""));
}

const controls=document.getElementById("controls");
function showMessage(html,isError){
  controls.style.display="none";
  grid.style.gridTemplateColumns="1fr";
  grid.innerHTML='<div class="msg'+(isError?" err":"")+'">'+html+"</div>";
}

function applyData(res,sourceLabel){
  DATA=res; metric="Total TLs"; groupIdx=0; focus="";
  document.getElementById("srcLabel").textContent=sourceLabel;
  controls.style.display="";
  syncControls(); render();
}

// live fetch from the published sheet — the only data source
async function loadFromSheet(){
  try{
    const url=SHEET_CSV_URL+(SHEET_CSV_URL.includes("?")?"&":"?")+"_="+Date.now();
    const r=await fetch(url); if(!r.ok) throw new Error("HTTP "+r.status);
    const res=parseGrid(parseCSV(await r.text()));
    if(res.error) throw new Error(res.error);
    const now=new Date().toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"});
    applyData(res,"Live from sheet · "+now);
  }catch(e){
    if(!DATA){ // only surface the error when there's no good data already on screen
      document.getElementById("srcLabel").textContent="Not connected";
      showMessage("Couldn’t load data from the sheet — <b>"+e.message+"</b>.<br>Check that the Truckload Forecast tab is still published to the web. Retrying automatically…",true);
    }
  }
}

// startup — live only, no placeholder
if(SHEET_CSV_URL){
  showMessage('<span class="spin"></span>Loading live data from your sheet…');
  loadFromSheet();
  setInterval(loadFromSheet,5*60*1000);
} else {
  showMessage("No data source configured.",true);
}
</script>
</body>
</html>
