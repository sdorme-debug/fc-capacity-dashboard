<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Network WOH — Packaging</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f9f9f8; color: #1a1a1a; padding: 24px; }
    h1 { font-size: 16px; font-weight: 500; color: #444; margin-bottom: 4px; }
    .subtitle { font-size: 12px; color: #888; margin-bottom: 16px; }
    .status { font-size: 11px; color: #aaa; margin-bottom: 12px; }
    .card { background:#fff; border:0.5px solid rgba(0,0,0,0.1); border-radius:10px; overflow:hidden; }
    .sku-row { display:flex; align-items:center; border-bottom:0.5px solid rgba(0,0,0,0.04); padding:4px 0; }
    .sku-row:last-child { border-bottom:none; }
    .cat-label { width:120px; flex-shrink:0; font-size:10px; font-weight:500; color:#aaa; padding:0 12px; text-align:right; white-space:nowrap; }
    .cat-label.first { color:#555; }
    .sku-name { font-size:11px; color:#666; flex:1; padding:0 8px; }
    .woh-dot { display:inline-block; width:5px; height:5px; border-radius:50%; margin-right:5px; vertical-align:middle; flex-shrink:0; }
    .sku-woh { font-size:12px; font-weight:500; padding-right:16px; }
    .group-divider { height:0.5px; background:rgba(0,0,0,0.06); margin:4px 0; }
    .c-oos { color:#791F1F; } .c-critical { color:#A32D2D; }
    .c-atrisk { color:#BA7517; } .c-ok { color:#27ae60; } .c-good { color:#1D9E75; }
  </style>
</head>
<body>
  <h1>Network WOH — Packaging</h1>
  <p class="subtitle" id="subtitle">Loading...</p>
  <p class="status" id="status"></p>
  <div id="content"></div>

  <script>
    const CSV = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vS5UGXu44UBGjQp-RWXHUmU1r1EEnbVEHtwi952lTKGfWEWUdCLwgEvytyXCfWtrTtJgn0DGb5qUavg/pub?gid=552345443&single=true&output=csv';
    const INSULATION_CATS = ['8in Insulation','11in Insulation','14in Insulation'];

    function parseCSV(text) {
      return text.trim().split('\n').map(r => {
        const cols=[]; let cur='', inQ=false;
        for(let i=0;i<r.length;i++){
          const ch=r[i];
          if(ch==='"'){inQ=!inQ;}
          else if(ch===','&&!inQ){cols.push(cur.trim());cur='';}
          else{cur+=ch;}
        }
        cols.push(cur.trim());
        return cols;
      });
    }

    function wohClass(v) {
  if(v<=0) return 'c-oos'; if(v<1) return 'c-critical';
  if(v<2) return 'c-atrisk'; if(v<4) return 'c-ok';
  if(v<8) return 'c-good'; return 'c-great';
}

function dotColor(v) {
  if(v<=0) return '#791F1F'; if(v<1) return '#A32D2D';
  if(v<2) return '#BA7517'; if(v<4) return '#27ae60';
  if(v<8) return '#1D9E75'; return '#7F77DD';
}

    function buildRows(skus, catLabel) {
      let html = '';
      skus.forEach((s, i) => {
        const showLabel = i === 0 && catLabel;
        const midLabel = i === Math.floor(skus.length / 2) && catLabel && skus.length > 1;
        html += '<div class="sku-row">';
        if(catLabel) {
          if(i === Math.floor((skus.length - 1) / 2)) {
            html += '<div class="cat-label first">'+catLabel+'</div>';
          } else {
            html += '<div class="cat-label"></div>';
          }
        } else {
          html += '<div class="cat-label"></div>';
        }
        html += '<span class="woh-dot" style="background:'+dotColor(s.woh)+';"></span>';
        html += '<span class="sku-name">'+s.sku+'</span>';
        html += '<span class="sku-woh '+wohClass(s.woh)+'">'+s.woh.toFixed(1)+'</span>';
        html += '</div>';
      });
      return html;
    }

    fetch(CSV).then(r=>r.text()).then(text=>{
      const rows = parseCSV(text).slice(1);
      const week = rows[0] ? rows[0][3] : '';
      document.getElementById('subtitle').textContent = 'Week of ' + week;
      document.getElementById('status').textContent = 'Live from Google Sheets · refreshes on page load';

      const unlabeled = [];
      const insulation = {'8in Insulation':[],'11in Insulation':[],'14in Insulation':[]};

      rows.forEach(r => {
        const cat = r[0]||'';
        const sku = r[1], woh = parseFloat(r[2]);
        if(!sku||isNaN(woh)) return;
        if(INSULATION_CATS.includes(cat)) {
          insulation[cat].push({sku, woh});
        } else {
          unlabeled.push({sku, woh});
        }
      });

      unlabeled.sort((a,b)=>a.woh-b.woh);
      INSULATION_CATS.forEach(c => insulation[c].sort((a,b)=>a.woh-b.woh));

      let html = '<div class="card">';
      html += buildRows(unlabeled, null);

      INSULATION_CATS.forEach((cat, i) => {
        if(!insulation[cat].length) return;
        html += '<div class="group-divider"></div>';
        html += buildRows(insulation[cat], cat);
      });

      html += '</div>';
      document.getElementById('content').innerHTML = html;
    }).catch(err=>{ document.getElementById('status').textContent='Could not load: '+err.message; });
  </script>
</body>
</html>
