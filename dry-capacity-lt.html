<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FC Projected Dry Capacity Need</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f9f9f8; color: #1a1a1a; padding: 24px; }
    h1 { font-size: 16px; font-weight: 500; color: #444; margin-bottom: 4px; }
    .subtitle { font-size: 12px; color: #888; margin-bottom: 20px; }
    .metric-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(100px, 1fr)); gap: 8px; margin-bottom: 20px; }
    .metric { background: #fff; border: 0.5px solid rgba(0,0,0,0.1); border-radius: 8px; padding: 10px 14px; }
    .metric-label { font-size: 11px; color: #888; margin-bottom: 4px; }
    .metric-value { font-size: 20px; font-weight: 500; }
    .chart-card { background: #fff; border: 0.5px solid rgba(0,0,0,0.1); border-radius: 12px; padding: 20px; margin-bottom: 16px; }
    .chart-title { font-size: 13px; font-weight: 500; color: #444; margin-bottom: 12px; }
    .legend { display: flex; flex-wrap: wrap; gap: 12px; margin-bottom: 14px; font-size: 12px; color: #666; }
    .legend-item { display: flex; align-items: center; gap: 5px; }
    .status { font-size: 11px; color: #aaa; margin-top: 12px; }
    .error { color: #c0392b; font-size: 13px; padding: 12px; background: #fdf0ee; border-radius: 8px; }
    table { width: 100%; border-collapse: collapse; font-size: 12px; }
    th { text-align: left; padding: 8px 10px; color: #888; font-weight: 500; border-bottom: 0.5px solid rgba(0,0,0,0.1); font-size: 11px; }
    td { padding: 8px 10px; border-bottom: 0.5px solid rgba(0,0,0,0.06); }
    tr:last-child td { border-bottom: none; }
    .fc-label { font-weight: 500; color: #444; }
    .pos { color: #27ae60; } .warn { color: #e67e22; } .neg { color: #c0392b; }
  </style>
</head>
<body>
  <h1>Projected dry capacity need</h1>
  <p class="subtitle" id="subtitle">Loading...</p>
  <div class="metric-grid" id="metrics"></div>
  <div class="chart-card">
    <div class="chart-title">Utilization % by FC</div>
    <div class="legend" id="legend"></div>
    <div style="position: relative; height: 320px;">
      <canvas id="utilChart"></canvas>
    </div>
  </div>
  <div class="chart-card">
    <div class="chart-title">Remaining slots by FC</div>
    <table id="netTable"><thead><tr id="netHead"></tr></thead><tbody id="netBody"></tbody></table>
  </div>
  <p class="status" id="status"></p>

  <script>
    const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQiDgH4o8p0J8fySDLOMMFujjNVsput_1yPA-dsTCfCtajbD7ozpfZSp_V3qcTJWUQOr4z9BI-fcvaW/pub?gid=1136008380&single=true&output=csv';

    const FC_STYLES = {
      'EWR (FC+offsite)': { color: '#378ADD', dash: [2,2] },
      'EWR':  { color: '#378ADD', dash: [] },
      'MEM':  { color: '#1D9E75', dash: [6,3] },
      'FTW':  { color: '#7F77DD', dash: [4,2,1,2] },
      'RNO':  { color: '#639922', dash: [3,3] },
      'SMF':  { color: '#888780', dash: [8,3] },
      'JAX':  { color: '#BA7517', dash: [4,4] },
      'MKE':  { color: '#D85A30', dash: [2,2] },
    };

    const MONTH_NAMES = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

    function parseCSV(text) {
      return text.trim().split('\n').map(r => {
        const cols = []; let cur = '', inQ = false;
        for (let i = 0; i < r.length; i++) {
          const ch = r[i];
          if (ch === '"') { inQ = !inQ; }
          else if (ch === ',' && !inQ) { cols.push(cur.trim()); cur = ''; }
          else { cur += ch; }
        }
        cols.push(cur.trim());
        return cols;
      });
    }

    function parseMonthLabel(label) {
      // "May 2026" or "Jun 2026"
      const parts = label.trim().split(' ');
      if (parts.length !== 2) return null;
      const mIdx = MONTH_NAMES.indexOf(parts[0]);
      const yr = parseInt(parts[1]);
      if (mIdx === -1 || isNaN(yr)) return null;
      return new Date(yr, mIdx, 1);
    }

    function parseVal(v) {
      if (!v || v === '' || v === '#DIV/0!' || v === '#N/A') return null;
      const n = parseFloat(v.toString().replace('%', '').replace(/,/g, ''));
      return isNaN(n) ? null : n;
    }

    const today = new Date();
    const startCutoff = new Date(today.getFullYear(), today.getMonth() + 2, 1);
    const endCutoff = new Date(2027, 5, 30);

    fetch(CSV_URL)
      .then(r => { if (!r.ok) throw new Error('HTTP ' + r.status); return r.text(); })
      .then(text => {
        const rows = parseCSV(text);

        // Row 0 = header: type, FC, May 2026, Jun 2026...
        const header = rows[0];
        const allMonths = header.slice(2);

        // Filter to months in range
        const validIndices = [];
        const months = [];
        allMonths.forEach((m, i) => {
          const d = parseMonthLabel(m);
          if (!d) return;
          if (d >= startCutoff && d <= endCutoff) {
            validIndices.push(i + 2); // +2 because header has type, FC first
            months.push(m);
          }
        });

        if (months.length === 0) {
          document.getElementById('subtitle').textContent = 'No data available for the selected range';
          return;
        }

        document.getElementById('subtitle').textContent = months[0] + ' – ' + months[months.length - 1];
        document.getElementById('status').textContent = 'Live from Google Sheets · refreshes on page load';

        const utilRows     = rows.filter(r => r[0] === 'util');
        const remainingRows = rows.filter(r => r[0] === 'remaining');

        // Metric cards
        const metricsEl = document.getElementById('metrics');
        utilRows.forEach(r => {
          const fc = r[1];
          const vals = validIndices.map(i => parseVal(r[i])).filter(v => v !== null);
          if (!vals.length) return;
          const maxVal = Math.max(...vals);
          const maxMonth = months[validIndices.map(i => parseVal(r[i])).indexOf(maxVal)];
          const color = maxVal >= 90 ? '#c0392b' : maxVal >= 75 ? '#e67e22' : '#27ae60';
          metricsEl.innerHTML += '<div class="metric"><div class="metric-label">' + fc + ' peak (' + maxMonth + ')</div><div class="metric-value" style="color:' + color + '">' + maxVal.toFixed(1) + '%</div></div>';
        });

        // Legend
        const legendEl = document.getElementById('legend');
        utilRows.forEach(r => {
          const fc = r[1];
          const s = FC_STYLES[fc] || { color: '#888' };
          legendEl.innerHTML += '<div class="legend-item"><span style="display:inline-block;width:20px;height:2px;background:' + s.color + '"></span>' + fc + '</div>';
        });

        // Chart
        new Chart(document.getElementById('utilChart'), {
          type: 'line',
          data: {
            labels: months,
            datasets: [
              ...utilRows.map(r => {
                const fc = r[1];
                const s = FC_STYLES[fc] || { color: '#888', dash: [] };
                return {
                  label: fc,
                  data: validIndices.map(i => parseVal(r[i])),
                  borderColor: s.color,
                  backgroundColor: 'transparent',
                  borderWidth: 2,
                  borderDash: s.dash,
                  pointRadius: 3,
                  pointBackgroundColor: s.color,
                  tension: 0.3,
                  spanGaps: true,
                };
              }),
              {
                label: '100% cap',
                data: Array(months.length).fill(100),
                borderColor: '#e74c3c',
                borderWidth: 1.5,
                borderDash: [4, 4],
                pointRadius: 0,
                backgroundColor: 'transparent',
              }
            ]
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            interaction: { mode: 'index', intersect: false },
            plugins: {
              legend: { display: false },
              tooltip: { callbacks: { label: ctx => ctx.dataset.label + ': ' + (ctx.parsed.y !== null ? ctx.parsed.y.toFixed(1) + '%' : '—') } }
            },
            scales: {
              y: { min: 0, max: 200, ticks: { callback: v => v + '%', font: { size: 11 } }, grid: { color: 'rgba(0,0,0,0.06)' } },
              x: { ticks: { font: { size: 11 }, autoSkip: false }, grid: { display: false } }
            }
          }
        });

        // Remaining slots table
        const head = document.getElementById('netHead');
        head.innerHTML = '<th>FC</th>' + months.map(m => '<th>' + m + '</th>').join('');
        const body = document.getElementById('netBody');
        remainingRows.forEach(r => {
          const fc = r[1];
          const cells = validIndices.map(i => {
            const v = parseVal(r[i]);
            if (v === null) return '<td>—</td>';
            const n = Math.round(v);
            const cls = n < 0 ? 'neg' : n < 200 ? 'warn' : 'pos';
            return '<td class="' + cls + '">' + n.toLocaleString() + '</td>';
          }).join('');
          body.innerHTML += '<tr><td class="fc-label">' + fc + '</td>' + cells + '</tr>';
        });
      })
      .catch(err => {
        document.getElementById('metrics').innerHTML = '<div class="error">Could not load data: ' + err.message + '</div>';
      });
  </script>
</body>
</html>
