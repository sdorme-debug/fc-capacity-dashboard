<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>FC Short Term Dry Capacity</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #f7f7f6;
    color: #1a1a1a;
    padding: 32px 40px;
  }
  h1 { font-size: 19px; font-weight: 600; color: #222; margin-bottom: 5px; letter-spacing: -0.01em; }
  .subtitle { font-size: 13px; color: #8a8a86; margin-bottom: 2px; }
  .status { font-size: 11px; color: #b3b3af; margin-bottom: 24px; }
  .error { color: #c0392b; font-size: 13px; padding: 14px 16px; background: #fdf0ee; border-radius: 10px; }

  .tabs { display: flex; gap: 26px; border-bottom: 1px solid #e8e8e5; margin-bottom: 20px; }
  .tab { font-size: 13.5px; padding-bottom: 10px; cursor: pointer; color: #9a9a96; border-bottom: 2px solid transparent; user-select: none; transition: color 0.15s; }
  .tab:hover { color: #444; }
  .tab.active { color: #1a1a1a; font-weight: 600; border-bottom-color: #1a1a1a; }

  .pills { display: flex; gap: 8px; margin-bottom: 24px; flex-wrap: wrap; }
  .pill { font-size: 12px; padding: 7px 14px; border-radius: 16px; background: #edede9; cursor: pointer; user-select: none; color: #555; transition: background 0.15s, color 0.15s; }
  .pill:hover { background: #e2e2dd; }
  .pill.active { background: #1a1a1a; color: #fff; }

  .chart-card {
    background: #fff;
    border: 1px solid #ececec;
    box-shadow: 0 1px 2px rgba(0,0,0,0.03);
    border-radius: 14px;
    padding: 22px 24px;
    margin-bottom: 18px;
  }
  .fc-block { margin-bottom: 18px; }
  .fc-header { display: flex; align-items: center; gap: 9px; font-size: 13.5px; font-weight: 600; color: #333; margin-bottom: 14px; }
  .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; flex-shrink: 0; }

  table { width: 100%; border-collapse: collapse; font-size: 12.5px; table-layout: fixed; }
  col.label-col { width: 190px; }
  th {
    text-align: right;
    padding: 0 10px 10px 10px;
    color: #9a9a96;
    font-weight: 500;
    border-bottom: 1px solid #ececec;
    font-size: 11px;
    white-space: nowrap;
  }
  th:first-child, td:first-child { text-align: left; }
  td { padding: 11px 10px; border-bottom: 1px solid #f2f2f0; font-weight: 600; text-align: right; }
  tr:last-child td { border-bottom: none; }
  tbody tr:hover { background: #fafaf9; }

  td.fc-cell { overflow: hidden; }
  .fc-label { font-weight: 600; color: #333; display: flex; align-items: center; gap: 8px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .label-sub { color: #b3b3af; font-weight: 400; font-size: 10.5px; margin-left: 2px; white-space: nowrap; }

  .pos { color: #1e8e5a; } .warn { color: #d9822b; } .neg { color: #c0392b; }
  .onhand { color: #d9822b; }
</style>
</head>
<body>

<h1>Short term dry capacity</h1>
<p class="subtitle" id="subtitle">Loading...</p>
<p class="status" id="status"></p>

<div class="tabs">
  <div class="tab active" data-tab="summary">Summary</div>
  <div class="tab" data-tab="detail">Detail</div>
</div>

<div id="pills" class="pills" style="display:none;"></div>

<div class="chart-card" id="summaryCard">
  <table id="summaryTable">
    <colgroup id="summaryColgroup"></colgroup>
    <thead><tr id="summaryHead"></tr></thead>
    <tbody id="summaryBody"></tbody>
  </table>
</div>

<div id="detailView" style="display:none;"></div>

<script>
const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQiDgH4o8p0J8fySDLOMMFujjNVsput_1yPA-dsTCfCtajbD7ozpfZSp_V3qcTJWUQOr4z9BI-fcvaW/pub?gid=535134841&single=true&output=csv';

// Palette cycled across whatever base FC names actually show up in the data —
// no hardcoded FC list, so this survives the source sheet adding/removing rows.
const PALETTE = ['#378ADD', '#1D9E75', '#7F77DD', '#639922', '#888780', '#BA7517', '#D85A30', '#C24E88', '#4AA8C0'];

function parseCSV(text) {
  return text.trim().split('\n').map(r => {
    const cols = []; let cur = '', inQ = false;
    for (let i = 0; i < r.length; i++) {
      const ch = r[i];
      if (ch === '"') { inQ = !inQ; }
      else if (ch === ',' && !inQ) { cols.push(cur.trim()); cur = ''; }
      else { cur += ch; }
    }
    cols.push(cur.trim());
    return cols;
  });
}

function parseVal(v) {
  if (v === undefined || v === null || v === '' || v === '#DIV/0!' || v === '#N/A') return null;
  const n = parseFloat(v.toString().replace('%', '').replace(/,/g, ''));
  return isNaN(n) ? null : n;
}

function shortDate(label) {
  const parts = label.trim().split('/');
  if (parts.length < 2) return label;
  return parts[0] + '/' + parts[1];
}

function utilColor(pct) {
  if (pct >= 100) return 'neg';
  if (pct >= 85) return 'warn';
  return 'pos';
}

// Strips ALL parenthetical groups down to a clean root name, and uses the
// LAST (most specific) parenthetical group as the sub-label. This collapses
// names like "EWR (ELZ + LYN) (ELZ + LYN + NEW)" down to base "EWR" with a
// single sub-label "ELZ + LYN + NEW", instead of leaving a redundant
// "(ELZ + LYN)" chunk baked into the main label.
function splitName(name) {
  const firstParen = name.indexOf('(');
  if (firstParen === -1) return { base: name.trim(), sub: '' };
  const base = name.slice(0, firstParen).trim();
  const groups = [...name.matchAll(/\(([^)]*)\)/g)].map(m => m[1].trim()).filter(Boolean);
  const sub = groups.length ? groups[groups.length - 1] : '';
  return { base: base || name.trim(), sub };
}

// Builds a <colgroup> so every row (header + body, summary + detail) shares
// identical column widths, regardless of how long any individual label is.
function buildColgroup(dateCount) {
  let html = '<col class="label-col">';
  for (let i = 0; i < dateCount; i++) html += '<col>';
  return html;
}

const fetchUrl = CSV_URL + (CSV_URL.includes('?') ? '&' : '?') + 'cachebust=' + Date.now();

fetch(fetchUrl)
  .then(r => { if (!r.ok) throw new Error('HTTP ' + r.status); return r.text(); })
  .then(text => {
    const rows = parseCSV(text);
    const header = rows[0];
    const dateLabels = header.slice(2);
    const dates = dateLabels.map(shortDate);

    document.getElementById('subtitle').textContent = 'Next ' + dates.length + ' weeks \u00b7 ' + dates[0] + ' \u2013 ' + dates[dates.length - 1];
    document.getElementById('status').textContent = 'Live from Google Sheets \u00b7 refreshes on page load';
    document.getElementById('summaryColgroup').innerHTML = buildColgroup(dates.length);

    const byType = {};
    const utilOrder = []; // preserves the row order from the CSV for util specifically
    rows.slice(1).forEach(r => {
      const type = r[0];
      const fc = r[1];
      if (!byType[type]) byType[type] = {};
      byType[type][fc] = r.slice(2).map(parseVal);
      if (type === 'util' && !utilOrder.includes(fc)) utilOrder.push(fc);
    });

    const oh = byType['oh'] || {};
    const util = byType['util'] || {};
    const remaining = byType['remaining'] || {};

    // Build base-name groups (e.g. all "EWR (...)" variants collapse into base "EWR")
    // in the order they first appear, and assign each base a stable color.
    const baseOrder = [];
    const baseColor = {};
    utilOrder.forEach(fc => {
      const { base } = splitName(fc);
      if (!baseOrder.includes(base)) {
        baseColor[base] = PALETTE[baseOrder.length % PALETTE.length];
        baseOrder.push(base);
      }
    });

    // ---------- Summary table ----------
    const head = document.getElementById('summaryHead');
    head.innerHTML = '<th>FC</th>' + dates.map(d => '<th>' + d + '</th>').join('');
    const body = document.getElementById('summaryBody');
    body.innerHTML = '';

    utilOrder.forEach(fc => {
      const vals = util[fc];
      if (!vals) return;
      const { base, sub } = splitName(fc);
      const color = baseColor[base] || '#888';
      const labelHtml = sub
        ? base + '<span class="label-sub">' + sub + '</span>'
        : base;
      const cells = vals.map(v => {
        if (v === null) return '<td>\u2014</td>';
        const pct = Math.round(v * 100);
        return '<td class="' + utilColor(pct) + '">' + pct + '%</td>';
      }).join('');
      body.innerHTML += '<tr><td class="fc-cell"><span class="fc-label"><span class="dot" style="background:' + color + '"></span>' + labelHtml + '</span></td>' + cells + '</tr>';
    });

    // ---------- Detail view ----------
    const detailEl = document.getElementById('detailView');

    function metricRow(label, sub, valsArr, colorFn, isPct) {
      const cells = (valsArr && valsArr.length ? valsArr : dates.map(() => null)).map(v => {
        if (v === null || v === undefined) return '<td>\u2014</td>';
        const cls = colorFn(v);
        const display = isPct ? Math.round(v * 100) + '%' : Math.round(v).toLocaleString();
        return '<td class="' + cls + '">' + display + '</td>';
      }).join('');
      return '<tr><td class="fc-cell"><span class="fc-label">' + label + (sub ? '<span class="label-sub">' + sub + '</span>' : '') + '</span></td>' + cells + '</tr>';
    }

    // Find every CSV key (across oh/util/remaining) whose base name matches, then
    // render one row per sub-variant so nothing gets silently dropped or blanked.
    function renderFCBlock(base) {
      const color = baseColor[base] || '#888';
      const variants = utilOrder.filter(fc => splitName(fc).base === base);
      let rowsHtml = '';

      variants.forEach(fc => {
        const { sub } = splitName(fc);
        rowsHtml += metricRow('Utilization %', sub, util[fc], v => utilColor(v * 100), true);
      });

      // Remaining Slots may use different sub-labels than Utilization (e.g. "w/ offsite" vs "FC")
      Object.keys(remaining).filter(fc => splitName(fc).base === base).forEach(fc => {
        const { sub } = splitName(fc);
        rowsHtml += metricRow('Net Avail Pallets', sub, remaining[fc], v => v < 0 ? 'neg' : 'pos', false);
      });

      Object.keys(oh).filter(fc => splitName(fc).base === base).forEach(fc => {
        const { sub } = splitName(fc);
        rowsHtml += metricRow('On Hand', sub, oh[fc], () => 'onhand', false);
      });

      return '<div class="fc-block chart-card">' +
        '<div class="fc-header"><span class="dot" style="background:' + color + '"></span>' + base + '</div>' +
        '<table><colgroup>' + buildColgroup(dates.length) + '</colgroup>' +
        '<tr><th></th>' + dates.map(d => '<th>' + d + '</th>').join('') + '</tr>' + rowsHtml + '</table>' +
        '</div>';
    }

    function renderDetail(filter) {
      const basesToShow = filter === 'ALL' ? baseOrder : [filter];
      detailEl.innerHTML = basesToShow.map(renderFCBlock).join('');
    }

    // ---------- Pills ----------
    const pillsEl = document.getElementById('pills');
    const pillFCs = [{ key: 'ALL', label: 'All FCs' }, ...baseOrder.map(f => ({ key: f, label: f }))];
    pillsEl.innerHTML = pillFCs.map((f, i) => '<div class="pill' + (i === 0 ? ' active' : '') + '" data-filter="' + f.key + '">' + f.label + '</div>').join('');
    pillsEl.querySelectorAll('.pill').forEach(p => {
      p.addEventListener('click', () => {
        pillsEl.querySelectorAll('.pill').forEach(x => x.classList.remove('active'));
        p.classList.add('active');
        renderDetail(p.dataset.filter);
      });
    });

    renderDetail('ALL');

    // ---------- Tabs ----------
    document.querySelectorAll('.tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        const isDetail = tab.dataset.tab === 'detail';
        document.getElementById('summaryCard').style.display = isDetail ? 'none' : '';
        detailEl.style.display = isDetail ? '' : 'none';
        pillsEl.style.display = isDetail ? 'flex' : 'none';
      });
    });
  })
  .catch(err => {
    document.getElementById('summaryCard').innerHTML = '<div class="error">Could not load data: ' + err.message + '</div>';
  });
</script>

</body>
</html>
