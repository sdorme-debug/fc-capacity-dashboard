<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Coman WOH</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f9f9f8; color: #1a1a1a; padding: 24px; }
    h1 { font-size: 16px; font-weight: 500; color: #444; margin-bottom: 4px; }
    .subtitle { font-size: 12px; color: #888; margin-bottom: 16px; }
    .status { font-size: 11px; color: #aaa; margin-bottom: 12px; }
    .top-tabs { display:flex; gap:0; margin-bottom:16px; border-bottom:0.5px solid #ddd; }
    .top-tab { font-size:12px; padding:6px 16px; cursor:pointer; color:#888; border-bottom:2px solid transparent; margin-bottom:-0.5px; transition:all 0.15s; }
    .top-tab.active { color:#1a1a1a; border-bottom-color:#1a1a1a; font-weight:500; }
    .section-view { display:none; }
    .section-view.active { display:block; }
    .group-card { background:#fff; border:0.5px solid rgba(0,0,0,0.1); border-radius:10px; margin-bottom:10px; overflow:hidden; }
    .group-header { font-size:12px; font-weight:500; color:#444; padding:8px 14px; background:#f5f5f3; border-bottom:0.5px solid rgba(0,0,0,0.08); }
    .woh-table { width:100%; border-collapse:collapse; font-size:11px; }
    .woh-table th { padding:5px 10px; color:#888; font-weight:400; text-align:center; border-bottom:0.5px solid rgba(0,0,0,0.08); white-space:nowrap; font-size:10px; }
    .woh-table th.left { text-align:left; min-width:120px; }
    .woh-table td { padding:4px 10px; text-align:center; border-bottom:0.5px solid rgba(0,0,0,0.04); font-size:11px; white-space:nowrap; }
    .woh-table td.left { text-align:left; font-size:11px; color:#555; }
    .woh-table tr:last-child td { border-bottom:none; }
    .wv { font-weight:500; }
    .c-oos { color:#791F1F; } .c-critical { color:#A32D2D; }
    .c-atrisk { color:#BA7517; } .c-ok { color:#27ae60; } .c-good { color:#1D9E75; }
    .c-na { color:#ccc; }
    .chart-wrap { padding:16px; position:relative; height:220px; }
  </style>
</head>
<body>
  <h1>Coman WOH — 6 month outlook</h1>
  <p class="subtitle" id="subtitle">Loading...</p>
  <p class="status" id="status"></p>

  <div class="top-tabs">
    <div class="top-tab active" onclick="switchTab('bycoman')">By coman</div>
    <div class="top-tab" onclick="switchTab('byrecipe')">By recipe</div>
    <div class="top-tab" onclick="switchTab('charts')">Charts</div>
  </div>

  <div class="section-view active" id="view-bycoman"></div>
  <div class="section-view" id="view-byrecipe"></div>
  <div class="section-view" id="view-charts"></div>

  <script>
    const CSV = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRgqmVRirhaQ3AKoXv3nRKc1VK7DFlEkUQgfCLBINLi0nYD7zeapoRu7lY4pYP87MarrwiboOXjtzmf/pub?gid=785478594&single=true&output=csv';
    const COMAN_ORDER = ['TX-M','TX-S','IA-I','MN-C','IN-P','IN-S','CO-R'];
    const MONTH_NAMES = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    const COMAN_COLORS = {
      'TX-M': '#378ADD', 'TX-S': '#1D9E75', 'IA-I': '#BA7517',
      'MN-C': '#7F77DD', 'IN-P': '#D4537E', 'IN-S': '#D85A30', 'CO-R': '#639922',
    };

    function parseCSV(text) {
      return text.trim().split('\n').map(r => {
        const cols=[]; let cur='', inQ=false;
        for(let i=0;i<r.length;i++){
          const ch=r[i];
          if(ch==='"'){inQ=!inQ;}
          else if(ch===','&&!inQ){cols.push(cur.trim());cur='';}
          else{cur+=ch;}
        }
        cols.push(cur.trim());
        return cols;
      });
    }

    function wohClass(v) {
      if(v===null||v===undefined||isNaN(v)) return 'c-na';
      if(v<=0) return 'c-oos'; if(v<1) return 'c-critical';
      if(v<2) return 'c-atrisk'; if(v<4) return 'c-ok';
      return 'c-good';
    }

    function wohCell(v) {
      if(v===null||v===undefined||isNaN(v)) return '<span class="c-na">—</span>';
      return '<span class="wv '+wohClass(v)+'">'+v.toFixed(1)+'</span>';
    }

    function switchTab(tab) {
      document.querySelectorAll('.top-tab').forEach((t,i) => t.classList.toggle('active',['bycoman','byrecipe','charts'][i]===tab));
      ['bycoman','byrecipe','charts'].forEach(v => {
        document.getElementById('view-'+v).classList.toggle('active', v===tab);
      });
    }

    function parseMonthLabel(m) {
      const [mon, yr] = m.split(' ');
      return new Date(parseInt(yr), MONTH_NAMES.indexOf(mon), 1);
    }

    fetch(CSV).then(r=>r.text()).then(text=>{
      const rows = parseCSV(text).slice(1);
      const data = {}, allMonths = [], recipes = new Set(), comans = new Set();

      rows.forEach(r => {
        const [coman, recipe, month, woh] = r;
        if(!coman||!recipe||!month) return;
        comans.add(coman); recipes.add(recipe);
        if(!allMonths.includes(month)) allMonths.push(month);
        if(!data[coman]) data[coman] = {};
        if(!data[coman][recipe]) data[coman][recipe] = {};
        data[coman][recipe][month] = parseFloat(woh);
      });

      // Sort months chronologically
      allMonths.sort((a,b) => {
        const [am,ay] = a.split(' '), [bm,by] = b.split(' ');
        const ayN=parseInt(ay), byN=parseInt(by);
        if(ayN!==byN) return ayN-byN;
        return MONTH_NAMES.indexOf(am)-MONTH_NAMES.indexOf(bm);
      });

      // Filter to 6 months from today
      const today = new Date();
      const cutoff = new Date(today.getFullYear(), today.getMonth()+6, 1);
      const monthOrder = allMonths.filter(m => {
        const d = parseMonthLabel(m);
        return d >= new Date(today.getFullYear(), today.getMonth(), 1) && d < cutoff;
      });

      // Remove all-zero combos
      Object.keys(data).forEach(coman => {
        Object.keys(data[coman]).forEach(recipe => {
          const allZero = monthOrder.every(m => { const v=data[coman][recipe][m]; return !v||v===0||isNaN(v); });
          if(allZero) delete data[coman][recipe];
        });
      });

      document.getElementById('subtitle').textContent = monthOrder[0] + ' – ' + monthOrder[monthOrder.length-1];
      document.getElementById('status').textContent = 'Live from Google Sheets · refreshes on page load';

      // BY COMAN
      let byComanHTML = '';
      COMAN_ORDER.filter(c=>comans.has(c)).forEach(coman => {
        const recipeList = Object.keys(data[coman]||{}).sort();
        if(!recipeList.length) return;
        byComanHTML += '<div class="group-card"><div class="group-header">'+coman+'</div><div style="overflow-x:auto;"><table class="woh-table"><thead><tr><th class="left">Recipe</th>';
        monthOrder.forEach(m => { byComanHTML += '<th>'+m+'</th>'; });
        byComanHTML += '</tr></thead><tbody>';
        recipeList.forEach(recipe => {
          byComanHTML += '<tr><td class="left">'+recipe+'</td>';
          monthOrder.forEach(m => { const v=data[coman][recipe]?data[coman][recipe][m]:null; byComanHTML += '<td>'+wohCell(v)+'</td>'; });
          byComanHTML += '</tr>';
        });
        byComanHTML += '</tbody></table></div></div>';
      });
      document.getElementById('view-bycoman').innerHTML = byComanHTML;

      // BY RECIPE
      const recipeList = [...recipes].sort((a,b) => {
  const aComans = COMAN_ORDER.filter(c=>data[c]&&data[c][a]).length;
  const bComans = COMAN_ORDER.filter(c=>data[c]&&data[c][b]).length;
  if(bComans !== aComans) return bComans - aComans;
  return a.localeCompare(b); // alphabetical tiebreak
});
      let byRecipeHTML = '';
      recipeList.forEach(recipe => {
        const comanList = COMAN_ORDER.filter(c=>data[c]&&data[c][recipe]);
        if(!comanList.length) return;
        byRecipeHTML += '<div class="group-card"><div class="group-header">'+recipe+'</div><div style="overflow-x:auto;"><table class="woh-table"><thead><tr><th class="left">Coman</th>';
        monthOrder.forEach(m => { byRecipeHTML += '<th>'+m+'</th>'; });
        byRecipeHTML += '</tr></thead><tbody>';
        comanList.forEach(coman => {
          byRecipeHTML += '<tr><td class="left">'+coman+'</td>';
          monthOrder.forEach(m => { const v=data[coman][recipe]?data[coman][recipe][m]:null; byRecipeHTML += '<td>'+wohCell(v)+'</td>'; });
          byRecipeHTML += '</tr>';
        });
        byRecipeHTML += '</tbody></table></div></div>';
      });
      document.getElementById('view-byrecipe').innerHTML = byRecipeHTML;

      // CHARTS — one per recipe, comans as lines
      let chartsHTML = '';
      recipeList.forEach((recipe, ri) => {
        const comanList = COMAN_ORDER.filter(c=>data[c]&&data[c][recipe]);
        if(!comanList.length) return;
        chartsHTML += '<div class="group-card"><div class="group-header">'+recipe+'</div><div class="chart-wrap"><canvas id="chart-'+ri+'"></canvas></div></div>';
      });
      document.getElementById('view-charts').innerHTML = chartsHTML;

      // Build charts after DOM update
      setTimeout(() => {
        recipeList.forEach((recipe, ri) => {
          const comanList = COMAN_ORDER.filter(c=>data[c]&&data[c][recipe]);
          if(!comanList.length) return;
          const canvas = document.getElementById('chart-'+ri);
          if(!canvas) return;
          new Chart(canvas, {
            type: 'line',
            data: {
              labels: monthOrder,
              datasets: comanList.map(coman => ({
                label: coman,
                data: monthOrder.map(m => data[coman][recipe]?data[coman][recipe][m]||null:null),
                borderColor: COMAN_COLORS[coman]||'#888',
                backgroundColor: 'transparent',
                borderWidth: 2,
                pointRadius: 3,
                pointBackgroundColor: COMAN_COLORS[coman]||'#888',
                tension: 0.3,
                spanGaps: true,
              }))
            },
            options: {
              responsive: true, maintainAspectRatio: false,
              interaction: { mode:'index', intersect:false },
              plugins: {
                legend: { labels: { font:{ size:10 }, boxWidth:10, padding:8 } },
                tooltip: { callbacks: { label: ctx => ctx.dataset.label+': '+ctx.parsed.y.toFixed(1) } }
              },
              scales: {
                y: { min:0, ticks:{ font:{size:10} }, grid:{ color:'rgba(0,0,0,0.05)' } },
                x: { ticks:{ font:{size:10}, autoSkip:false }, grid:{ display:false } }
              }
            }
          });
        });
      }, 100);

    }).catch(err=>{ document.getElementById('status').textContent='Could not load: '+err.message; });
  </script>
</body>
</html>
